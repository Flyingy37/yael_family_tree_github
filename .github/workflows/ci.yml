# Typecheck, production build, and Playwright smoke tests
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/validate-canonical-csv.ts data/sample/canonical.sample.csv
      # System libs for headless Chromium (browsers come from postinstall → node_modules/.cache)
      - run: npx playwright install-deps chromium
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          VITE_CHAT_API_URL: ${{ vars.VITE_CHAT_API_URL }}
      - run: npm test
        env:
          CI: true
