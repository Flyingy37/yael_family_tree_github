name: Lint and Fix
on: [push, pull_request]

jobs:
  lint-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - run: npm install
      - name: Run ESLint and fix
        run: npm run lint -- --fix # מריץ תיקון אוטומטי לשגיאות קוד
      
      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-fix linting issues [skip ci]"